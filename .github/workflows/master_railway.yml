name: Build test and deploy API to Railway

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build_test_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build
        # Railway deploys automatically via its native GitHub integration.
        # This workflow acts as a CI gate: if build/tests fail, the commit
        # is marked failed and Railway will not deploy.
