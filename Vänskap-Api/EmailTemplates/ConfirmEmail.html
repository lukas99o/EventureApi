<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            color: #333;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin-top: 20px;
            background-color: #22c55e;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Confirm your email address</h2>
        <p>Hi {FirstName},</p>
        <p>Thank you for registering on Vänskap! Click the button below to confirm your email address:</p>
        <p style="text-align: center;">
            <a href="{confirmationLink}" class="btn">Confirm email</a>
        </p>
        <p>If you did not register with us, you can ignore this message.</p>
    </div>
</body>
</html>
